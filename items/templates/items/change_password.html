{% extends "base.html" %}
{% load static %}

{% block title %}Change Password{% endblock %}
{% block css_files %}
<link rel="stylesheet" href="{% static 'items/signup.css' %}">
{% endblock %}

{% block content %}

<div class="form-container">
    <!-- Home icon positioned inside the box, top-left corner -->
    <a href="{%url 'show_product'%}" class="home-icon-link">
        <span class="home-icon">&#127968;</span>
    </a>

    <h2>Change Password</h2>

    <form method="POST" action="{% url 'change_pass' user_username=user_username %}">
        {% csrf_token %}
        <div class="input-group">
            <label for="current_password">Current Password</label>
            <input type="password" id="current_password" name="current_password" placeholder="Enter your current password" required>
        </div>
        <div class="input-group">
            <label for="new_password">New Password</label>
            <input type="password" id="new_password" name="new_password" placeholder="Enter your new password" required>
        </div>
        <div class="input-group">
            <label for="confirm_password">Confirm Password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter your new password" required>
        </div>
        <button type="submit" class="btn btn-primary">Change Password</button>
    </form>
</div>

{% endblock %}
